        async function sync() {
            const statusEl = document.getElementById('cloudStatus');
            
            if (CLOUD_URL.includes("ВСТАВЬ")) {
                statusEl.innerHTML = '<i class="fas fa-exclamation-triangle mr-1"></i> ⚠️ НЕТ ССЫЛКИ';
                statusEl.className = "text-[9px] font-bold uppercase text-red-600 bg-red-100 px-2 py-1 rounded inline-block mt-1";
                if (data.length === 0) data = getDefaultData();
                render();
                return;
            }

            try {
                const response = await fetch(CLOUD_URL);
                const cloudData = await response.json();
                
                if (cloudData && cloudData.length > 0) {
                    data = cloudData;
                    statusEl.innerHTML = '<i class="fas fa-check-circle mr-1"></i> 🟢 ONLINE / SYNC OK';
                    statusEl.className = "text-[9px] font-bold uppercase text-emerald-600 bg-emerald-100 px-2 py-1 rounded shadow-sm inline-block mt-1";
                    render();
                } else {
                    statusEl.innerHTML = '<i class="fas fa-upload mr-1"></i> 🟡 ЗАПИСЬ БАЗЫ...';
                    statusEl.className = "text-[9px] font-bold uppercase text-amber-600 bg-amber-100 px-2 py-1 rounded shadow-sm inline-block mt-1";
                    data = getDefaultData();
                    render();
                    await save(true); // Форсируем сохранение в пустую таблицу
                }
            } catch (e) {
                statusEl.innerHTML = '<i class="fas fa-wifi fa-slash mr-1"></i> 🔴 ОШИБКА СЕТИ (LOCAL)';
                statusEl.className = "text-[9px] font-bold uppercase text-red-600 bg-red-100 px-2 py-1 rounded inline-block mt-1";
                if (data.length === 0) data = getDefaultData();
                render();
            }
        }

        async function save(isInit = false) {
            if (CLOUD_URL.includes("ВСТАВЬ")) return;
            const statusEl = document.getElementById('cloudStatus');
            statusEl.innerHTML = '<i class="fas fa-cloud-upload-alt mr-1"></i> 🔵 СОХРАНЕНИЕ...';
            statusEl.className = "text-[9px] font-bold uppercase text-blue-600 bg-blue-100 px-2 py-1 rounded inline-block mt-1";
            try {
                await fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                setTimeout(() => {
                    statusEl.innerHTML = isInit ? '<i class="fas fa-check-double mr-1"></i> 🟢 БАЗА СОЗДАНА' : '<i class="fas fa-check-circle mr-1"></i> 🟢 ONLINE / SYNC OK';
                    statusEl.className = "text-[9px] font-bold uppercase text-emerald-600 bg-emerald-100 px-2 py-1 rounded shadow-sm inline-block mt-1";
                }, 1500);
            } catch (e) { 
                statusEl.innerHTML = '<i class="fas fa-times-circle mr-1"></i> 🔴 ОШИБКА ЗАПИСИ';
                statusEl.className = "text-[9px] font-bold uppercase text-red-600 bg-red-100 px-2 py-1 rounded inline-block mt-1";
            }
        }

        function render(fData = data) {
            tableBody.innerHTML = '';
            fData.forEach((item, i) => {
                const isIDU = item.type === 'IDU';
                const days = Math.floor((new Date() - new Date(item.date || new Date().toISOString().split('T')[0]))/(1000*60*60*24));
                const isDue = (isIDU && days >= 7) || (!isIDU && days >= 3);
                
                const tr = document.createElement('tr');
                tr.className = `border-b dark:border-slate-700/50 ${isDue ? 'animate-pulse-red' : ''}`;
                tr.innerHTML = `
                    <td class="px-4 py-4"><input type="date" value="${item.date}" onchange="u(${i},'date',this.value)" class="bg-transparent text-[10px] font-black outline-none text-slate-600 dark:text-slate-300 dark:[color-scheme:dark]"></td>
                    <td class="px-4 py-4"><div class="font-mono font-black text-sm text-blue-600 dark:text-blue-400">${item.kks}</div><div class="text-[9px] opacity-50 uppercase font-bold">${item.type}</div></td>
                    <td class="px-4 py-4"><input value="${item.area}" onchange="u(${i},'area',this.value)" class="bg-transparent text-[10px] font-black w-full outline-none uppercase text-slate-500 dark:text-slate-400"></td>
                    <td class="px-2 py-4 text-center">${isIDU ? '-' : `<input type="number" value="${item.press}" onchange="u(${i},'press',this.value)" class="w-14 bg-slate-100 dark:bg-slate-90
