        async function sync() {
            if (CLOUD_URL.includes("ВСТАВЬ")) return;
            try {
                const response = await fetch(CLOUD_URL);
                const cloudData = await response.json();
                if (cloudData.length > 0) {
                    data = cloudData;
                    document.getElementById('cloudStatus').innerText = "Online / Cloud Sync OK";
                    render();
                }
            } catch (e) {
                document.getElementById('cloudStatus').innerText = "Offline / Local Mode";
                if (data.length === 0) data = getDefaultData();
                render();
            }
        }

        async function save() {
            if (CLOUD_URL.includes("ВСТАВЬ")) return;
            document.getElementById('cloudStatus').innerText = "Saving...";
            try {
                await fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                setTimeout(sync, 1000);
            } catch (e) { document.getElementById('cloudStatus').innerText = "Save Error!"; }
        }

        function render(fData = data) {
            tableBody.innerHTML = '';
            fData.forEach((item, i) => {
                const isIDU = item.type === 'IDU';
                const days = Math.floor((new Date() - new Date(item.date))/(1000*60*60*24));
                const isDue = (isIDU && days >= 7) || (!isIDU && days >= 3);
                
                const tr = document.createElement('tr');
                tr.className = `border-b dark:border-slate-700 ${isDue ? 'animate-pulse-red' : ''}`;
                tr.innerHTML = `
                    <td class="px-4 py-4"><input type="date" value="${item.date}" onchange="u(${i},'date',this.value)" class="bg-transparent text-[10px] font-bold outline-none"></td>
                    <td class="px-4 py-4"><div class="font-bold text-sm">${item.kks}</div><div class="text-[9px] opacity-50">${item.type}</div></td>
                    <td class="px-4 py-4"><input value="${item.area}" onchange="u(${i},'area',this.value)" class="bg-transparent text-[10px] w-full outline-none uppercase"></td>
                    <td class="px-2 py-4 text-center">${isIDU ? '-' : `<input type="number" value="${item.press}" onchange="u(${i},'press',this.value)" class="w-12 bg-slate-100 dark:bg-slate-900 rounded text-center text-xs">`}</td>
                    <td class="px-2 py-4 text-center">${!isIDU ? '-' : `<input type="number" value="${item.temp}" onchange="u(${i},'temp',this.value)" class="w-12 bg-slate-100 dark:bg-slate-900 rounded text-center text-xs ${item.temp>25?'text-red-500':''}">`}</td>
                    <td class="px-4 py-4 text-center"><select onchange="u(${i},'motor',this.value)" class="bg-transparent text-[10px] font-bold outline-none">${isIDU ? `<option value="High Fan" ${item.motor=='High Fan'?'selected':''}>High Fan</option><option value="Off" ${item.motor=='Off'?'selected':''}>Off</option>` : `<option value="Running" ${item.motor=='Running'?'selected':''}>Running</option><option value="Off" ${item.motor=='Off'?'selected':''}>Off</option>`}</select></td>
                    <td class="px-4 py-4 text-center"><select onchange="u(${i},'power',this.value)" class="bg-transparent text-[10px] font-bold outline-none"><option value="Normal" ${item.power=='Normal'?'selected':''}>Normal</option><option value="Off" ${item.power=='Off'?'selected':''}>Off</option></select></td>
                    <td class="px-4 py-4 text-center"><select onchange="u(${i},'filter',this.value)" class="bg-transparent text-[10px] font-bold outline-none"><option value="Clean" ${item.filter=='Clean'?'selected':''}>Clean</option><option value="Dirty" ${item.filter=='Dirty'?'selected':''}>Dirty</option></select></td>
                    <td class="px-4 py-4 text-center"><button onclick="u(${i},'date','${new Date().toISOString().split('T')[0]}')" class="p-2 rounded-full ${isDue?'bg-orange-500 text-white animate-bounce':'bg-slate-100 dark:bg-slate-900'}"><i class="fas fa-check text-[10px]"></i></button></td>
                    <td class="px-4 py-4 text-center"><button onclick="t(${i})" class="text-[9px] font-bold uppercase px-2 py-1 rounded-full ${item.alarm=='Alarm'?'bg-red-500 text-white':'bg-emerald-100 text-emerald-700'}">${item.alarm}</button></td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function u(i, f, v) { data[i][f] = v; render(); save(); }
        function t(i) { data[i].alarm = data[i].alarm == 'Normal' ? 'Alarm' : 'Normal'; render(); save(); }
        function resetToDefault() { if(confirm("Reset data?")) { data = getDefaultData(); save(); render(); } }
        window.onload = sync;
        document.getElementById('search').oninput = e => render(data.filter(x => x.kks.toLowerCase().includes(e.target.value.toLowerCase())));
        function copyTelegramReport() { navigator.clipboard.writeText(`HVAC GH2: ${new Date().toLocaleDateString()}\nAll units OK.`).then(()=>alert("Copied!")); }
